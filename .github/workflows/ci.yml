name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Build & Test
    timeout-minutes: 15
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run Linters & Typecheck
      run: npm run check
      # You can ignore typecheck errors if you're gradually migrating, but ideally it should pass

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright Tests
      run: npx playwright test
      env:
        # Provide dummy env vars required by T3 stack for CI to pass
        NEXT_PUBLIC_APP_URL: http://localhost:3000
        AUTH_GOOGLE_ID: dummy
        AUTH_GOOGLE_SECRET: dummy
        DATABASE_URL: postgres://dummy:dummy@localhost:5432/dummy
        RESEND_API_KEY: re_dummy

    - name: Upload Playwright Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 7
